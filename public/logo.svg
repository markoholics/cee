<svg viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="The CEE Company">
  <!-- Outer thick ring -->
  <circle cx="250" cy="250" r="228" fill="none" stroke="currentColor" stroke-width="44"/>
  <!-- Inner thin ring -->
  <circle cx="250" cy="250" r="192" fill="none" stroke="currentColor" stroke-width="7"/>
  <!-- Side ear tabs -->
  <rect x="4" y="207" width="20" height="86" fill="currentColor"/>
  <rect x="476" y="207" width="20" height="86" fill="currentColor"/>
  <!-- Banner outer fill -->
  <rect x="20" y="207" width="460" height="86" fill="currentColor"/>
  <!-- Banner inner cutout (site background colour) -->
  <rect x="29" y="215" width="442" height="70" fill="#0A0A0B"/>
  <!-- Text -->
  <text
    x="250" y="252"
    text-anchor="middle"
    dominant-baseline="middle"
    font-family="Arial Black, Arial, sans-serif"
    font-size="38"
    font-weight="900"
    letter-spacing="6"
    fill="currentColor"
  >THE CEE COMPANY</text>
</svg>
